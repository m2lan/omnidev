# ==============================================================================
# OmniDev AI Platform — Full Development Environment
# Usage: docker compose -f deploy/docker/docker-compose.dev.yml up -d
# ==============================================================================

version: "3.9"

services:
  # --- Infrastructure (includes all from infra compose) ---
  # NOTE: Run docker-compose.infra.yml first, or use: make dev

  # --- API Gateway ---
  gateway:
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    container_name: omnidev-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: omnidev
      DB_PASSWORD: omnidev
      DB_NAME: omnidev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnidev

  # --- User Service ---
  user-service:
    build:
      context: ../../
      dockerfile: apps/services/user/Dockerfile
    container_name: omnidev-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      APP_ENV: development
      APP_PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: omnidev
      DB_PASSWORD: omnidev
      DB_NAME: omnidev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnidev

  # --- Chat Service ---
  chat-service:
    build:
      context: ../../
      dockerfile: apps/services/chat/Dockerfile
    container_name: omnidev-chat-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      APP_ENV: development
      APP_PORT: "8082"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: omnidev
      DB_PASSWORD: omnidev
      DB_NAME: omnidev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnidev

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: omnidev-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - omnidev

networks:
  omnidev:
    driver: bridge
